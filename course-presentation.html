<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Godot HD2D生存游戏教程 - 第一课时课件">
    <meta name="theme-color" content="#667eea">
    <title>Godot HD2D生存游戏教程 - 第一课时课件</title>
    
    <!-- 使用与Godot教程页面相同的样式 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/shared-theme.css">
    
    <style>
        /* 课件特定样式 */
        .course-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .course-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }
        
        .course-title {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .course-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            opacity: 0.8;
        }
        
        /* 卡片容器 */
        .card-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 500px;
        }
        
        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            max-width: 800px;
            width: 100%;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, opacity 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .card-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--primary-color-light);
        }
        
        .card-title {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .card-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            opacity: 0.9;
        }
        
        .card-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        
        .card-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .card-content::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }
        
        .card-content::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 3px;
        }
        
        /* 内容样式 */
        .content-section {
            margin-bottom: 1.5rem;
        }
        
        .content-title {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .content-title i {
            color: var(--primary-color);
        }
        
        .content-list {
            list-style: none;
            padding-left: 1.5rem;
        }
        
        .content-list li {
            margin-bottom: 0.8rem;
            padding-left: 1rem;
            position: relative;
            line-height: 1.6;
        }
        
        .content-list li:before {
            content: "•";
            color: var(--primary-color);
            font-weight: bold;
            position: absolute;
            left: -1rem;
        }
        
        .code-block {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1.2rem;
            margin: 1rem 0;
            border-left: 4px solid var(--primary-color);
            font-family: 'Courier New', monospace;
            overflow-x: auto;
        }
        
        .code-block code {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .link-item {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .link-item:hover {
            color: var(--primary-color-light);
            text-decoration: underline;
        }
        
        .link-item i {
            font-size: 0.9rem;
        }
        
        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        
        .nav-button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-width: 120px;
            justify-content: center;
        }
        
        .nav-button:hover {
            background: var(--primary-color-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .nav-button:disabled {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .nav-button.prev {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .nav-button.prev:hover:not(:disabled) {
            background: var(--border-color);
        }
        
        /* 进度指示器 */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 0 1rem;
            flex: 1;
            justify-content: center;
        }
        
        .progress-bar {
            flex: 1;
            max-width: 300px;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            min-width: 60px;
            text-align: center;
        }
        
        /* 卡片编号 */
        .card-number {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--primary-color);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow-sm);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .course-container {
                padding: 1rem;
            }
            
            .course-title {
                font-size: 2rem;
            }
            
            .card {
                padding: 1.5rem;
                min-height: 350px;
            }
            
            .card-title {
                font-size: 1.5rem;
            }
            
            .nav-buttons {
                flex-direction: column;
                gap: 1rem;
            }
            
            .progress-container {
                order: -1;
                width: 100%;
                margin-bottom: 1rem;
            }
            
            .nav-button {
                width: 100%;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card {
            animation: fadeIn 0.5s ease;
        }
        
        /* 学习目标特殊样式 */
        .learning-objectives {
            background: linear-gradient(135deg, var(--primary-color-light) 0%, var(--accent-color) 100%);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }
        
        .learning-objectives .content-title {
            color: white;
        }
        
        .learning-objectives .content-list li:before {
            color: white;
        }
        
        .learning-objectives .content-list li {
            color: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>

                    <div class="progress-container">

                    <button class="nav-button next" id="next-btn">

                </div>

        </main>
    </div>

        // 当前卡片索引
        let currentCardIndex = 0;
        const totalCards = courseData.length;

        // DOM元素
        const cardNumberElement = document.getElementById('card-number');
        const cardTitleElement = document.getElementById('card-title');
        const cardSubtitleElement = document.getElementById('card-subtitle');
        const cardContentElement = document.getElementById('card-content');
        const prevButton = document.getElementById('prev-btn');
        const nextButton = document.getElementById('next-btn');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');

        // 更新卡片内容
        function updateCard() {
            const card = courseData[currentCardIndex];
            
            // 更新卡片信息
            cardNumberElement.textContent = card.id;
            cardTitleElement.textContent = card.title;
            cardSubtitleElement.textContent = card.subtitle;
            cardContentElement.innerHTML = card.content;
            
            // 更新进度
            const progressPercentage = ((currentCardIndex + 1) / totalCards) * 100;
            progressFill.style.width = `${progressPercentage}%`;
            progressText.textContent = `${currentCardIndex + 1}/${totalCards}`;
            
            // 更新按钮状态
            prevButton.disabled = currentCardIndex === 0;
            nextButton.textContent = currentCardIndex === totalCards - 1 ? '完成' : '下一张';
            
            // 添加动画效果
            cardContentElement.style.opacity = '0';
            cardContentElement.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                cardContentElement.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                cardContentElement.style.opacity = '1';
                cardContentElement.style.transform = 'translateY(0)';
            }, 50);
        }

        // 切换到上一张卡片
        function goToPrevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                updateCard();
            }
        }

        // 切换到下一张卡片
        function goToNextCard() {
            if (currentCardIndex < totalCards - 1) {
                currentCardIndex++;
                updateCard();
            } else {
                // 如果是最后一张卡片，显示完成消息
                alert('恭喜！你已经完成了第一课时的所有内容！🎉');
            }
        }

        // 键盘导航
        document.addEventListener('keydown', (event) => {
            switch(event.key) {
                case 'ArrowLeft':
                    goToPrevCard();
                    break;
                case 'ArrowRight':
                case ' ':
                    goToNextCard();
                    break;
            }
        });

        // 按钮事件监听
        prevButton.addEventListener('click', goToPrevCard);
        nextButton.addEventListener('click', goToNextCard);

        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;
        
        cardContentElement.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].screenX;
        });
        
        cardContentElement.addEventListener('touchend', (event) => {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipe();
        });
        
        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // 向左滑动，下一张
                    goToNextCard();
                } else {
                    // 向右滑动，上一张
                    goToPrevCard();
                }
            }
        }

        // 初始化
        updateCard();
        
        // 添加页面加载完成提示
        window.addEventListener('load', () => {
            console.log('课件页面加载完成！');
            console.log(`共 ${totalCards} 张卡片`);
        });
    </script>
</body>
</html>
