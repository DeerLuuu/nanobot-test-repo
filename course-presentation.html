<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Godot HD2D生存游戏教程 - 第一课时课件演示">
    <meta name="keywords" content="Godot, 课件, 教程, 演示, HD2D">
    <meta name="author" content="nanobot AI">
    <meta name="theme-color" content="#667eea">
    <title>Godot HD2D生存游戏教程 - 第一课时课件</title>
    
    <!-- 外部资源 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/shared-theme.css">
    
    <style>
        /* ============================================
           课件特定样式 - 教学演示文档格式
           ============================================ */
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
        }
        
        .course-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-6);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ============================================
           顶部导航栏
           ============================================ */
        
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4) var(--space-6);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius-lg);
            margin-bottom: var(--space-6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }
        
        .nav-logo {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            color: white;
            text-decoration: none;
        }
        
        .nav-logo i {
            font-size: 1.5rem;
            color: var(--primary-color);
        }
        
        .nav-logo span {
            font-size: var(--text-lg);
            font-weight: 700;
        }
        
        .nav-divider {
            width: 1px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .course-info {
            display: flex;
            flex-direction: column;
        }
        
        .course-name {
            color: white;
            font-weight: 600;
            font-size: var(--text-base);
        }
        
        .lesson-name {
            color: rgba(255, 255, 255, 0.7);
            font-size: var(--text-sm);
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: var(--text-sm);
            cursor: pointer;
            transition: var(--transition-base);
            text-decoration: none;
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* ============================================
           主内容区 - 大幻灯片卡片
           ============================================ */
        
        .slide-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--space-6);
        }
        
        .slide-card {
            background: var(--card-bg);
            border-radius: var(--border-radius-xl);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            overflow: hidden;
            min-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* 幻灯片顶部装饰条 */
        .slide-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        }
        
        /* 幻灯片头部 */
        .slide-header {
            padding: var(--space-8) var(--space-10);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }
        
        .slide-header-left {
            flex: 1;
        }
        
        .slide-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: var(--border-radius-sm);
            font-weight: 800;
            font-size: var(--text-xl);
            margin-bottom: var(--space-4);
            box-shadow: var(--shadow-md);
        }
        
        .slide-title {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            color: var(--text-color);
            margin: 0 0 var(--space-2) 0;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        
        .slide-title i {
            color: var(--primary-color);
            font-size: 0.9em;
        }
        
        .slide-subtitle {
            font-size: var(--text-lg);
            color: var(--text-light);
            margin: 0;
        }
        
        .slide-header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: var(--space-3);
        }
        
        .slide-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary-color);
            border-radius: var(--border-radius-full);
            font-size: var(--text-sm);
            font-weight: 600;
        }
        
        .slide-badge i {
            font-size: 1rem;
        }
        
        /* 幻灯片内容区 */
        .slide-content {
            flex: 1;
            padding: var(--space-8) var(--space-10);
            overflow-y: auto;
        }
        
        /* 内容区块 */
        .content-section {
            margin-bottom: var(--space-8);
        }
        
        .content-section:last-child {
            margin-bottom: 0;
        }
        
        .section-title {
            font-size: var(--text-xl);
            color: var(--text-color);
            margin-bottom: var(--space-5);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding-bottom: var(--space-3);
            border-bottom: 2px solid var(--border-color);
        }
        
        .section-title i {
            color: var(--primary-color);
            font-size: 1.2em;
        }
        
        /* 内容列表 */
        .content-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .content-list li {
            padding: var(--space-4) var(--space-6);
            margin-bottom: var(--space-3);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.03), rgba(118, 75, 162, 0.03));
            border-radius: var(--border-radius-sm);
            border-left: 4px solid var(--primary-color);
            color: var(--text-color);
            font-size: var(--text-base);
            line-height: var(--leading-relaxed);
            transition: var(--transition-base);
        }
        
        .content-list li:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.08));
            transform: translateX(4px);
        }
        
        .content-list li.completed {
            border-left-color: var(--success-color);
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.05), rgba(39, 174, 96, 0.03));
        }
        
        .content-list li.completed::before {
            content: '✓';
            color: var(--success-color);
            font-weight: 700;
            margin-right: var(--space-3);
        }
        
        /* 步骤标记 */
        .step-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border-radius: var(--border-radius-full);
            font-size: var(--text-sm);
            font-weight: 700;
            margin-right: var(--space-3);
            box-shadow: var(--shadow-sm);
        }
        
        /* 学习目标区块 */
        .learning-objectives {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: var(--space-6);
            border-radius: var(--border-radius-md);
            margin-bottom: var(--space-6);
        }
        
        .learning-objectives .section-title {
            color: white;
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }
        
        .learning-objectives .section-title i {
            color: white;
        }
        
        .learning-objectives .content-list li {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: rgba(255, 255, 255, 0.5);
            color: white;
        }
        
        .learning-objectives .content-list li:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* 代码块 */
        .code-block {
            background: #1e1e1e;
            border-radius: var(--border-radius-md);
            padding: var(--space-5);
            margin: var(--space-5) 0;
            border-left: 4px solid var(--primary-color);
            overflow-x: auto;
        }
        
        .code-block code {
            font-family: 'Consolas', 'Monaco', 'Fira Code', monospace;
            font-size: var(--text-sm);
            line-height: 1.7;
            color: #d4d4d4;
            white-space: pre;
        }
        
        .code-comment { color: #6a9955; }
        .code-keyword { color: #569cd6; font-weight: 500; }
        .code-string { color: #ce9178; }
        .code-function { color: #dcdcaa; }
        .code-type { color: #4ec9b0; }
        .code-number { color: #b5cea8; }
        
        /* 提示框 */
        .tip-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.08));
            border: 2px solid var(--primary-color);
            border-radius: var(--border-radius-md);
            padding: var(--space-5);
            margin-top: var(--space-5);
        }
        
        .tip-box.warning {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.08), rgba(243, 156, 18, 0.04));
            border-color: var(--warning-color);
        }
        
        .tip-box.success {
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.08), rgba(39, 174, 96, 0.04));
            border-color: var(--success-color);
        }
        
        .tip-box h5 {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin: 0 0 var(--space-3) 0;
            font-size: var(--text-base);
        }
        
        .tip-box h5 i { font-size: 1.1em; }
        .tip-box p { margin: 0; color: var(--text-light); }
        .tip-box p a { color: var(--primary-color); }
        
        /* 链接样式 */
        .link-item {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            transition: var(--transition-fast);
        }
        
        .link-item:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        
        /* ============================================
           底部导航栏
           ============================================ */
        
        .slide-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-5) var(--space-10);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }
        
        .nav-button {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-4) var(--space-8);
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: var(--text-base);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            min-width: 140px;
            justify-content: center;
        }
        
        .nav-button.prev {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--border-color);
        }
        
        .nav-button.prev:hover:not(:disabled) {
            background: var(--bg-tertiary);
            border-color: var(--primary-color);
            transform: translateX(-4px);
        }
        
        .nav-button.next {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: var(--shadow-md);
        }
        
        .nav-button.next:hover:not(:disabled) {
            transform: translateX(4px);
            box-shadow: var(--shadow-lg);
        }
        
        .nav-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* 进度区 */
        .progress-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-3);
            flex: 1;
            max-width: 400px;
        }
        
        .progress-bar-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }
        
        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--border-color);
            border-radius: var(--border-radius-full);
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: var(--border-radius-full);
            transition: width var(--transition-smooth);
        }
        
        .progress-text {
            font-size: var(--text-sm);
            color: var(--text-light);
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }
        
        /* 幻灯片指示器 */
        .slide-indicators {
            display: flex;
            justify-content: center;
            gap: var(--space-2);
        }
        
        .indicator {
            width: 12px;
            height: 12px;
            border-radius: var(--border-radius-full);
            background: var(--border-color);
            cursor: pointer;
            transition: var(--transition-base);
            border: none;
        }
        
        .indicator:hover {
            background: var(--neutral-400);
            transform: scale(1.2);
        }
        
        .indicator.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            transform: scale(1.3);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        /* 键盘快捷键提示 */
        .keyboard-hint {
            position: fixed;
            bottom: var(--space-6);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: var(--space-3) var(--space-6);
            border-radius: var(--border-radius-full);
            font-size: var(--text-sm);
            opacity: 0;
            transition: opacity var(--transition-base);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        .keyboard-hint.visible {
            opacity: 1;
        }
        
        .keyboard-hint kbd {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: var(--text-xs);
        }
        
        /* ============================================
           响应式设计
           ============================================ */
        
        @media (max-width: 1024px) {
            .course-container {
                padding: var(--space-4);
            }
            
            .slide-header,
            .slide-content,
            .slide-footer {
                padding-left: var(--space-6);
                padding-right: var(--space-6);
            }
            
            .slide-title {
                font-size: 1.75rem;
            }
        }
        
        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                gap: var(--space-4);
                padding: var(--space-4);
            }
            
            .nav-left,
            .nav-right {
                width: 100%;
                justify-content: center;
            }
            
            .slide-header {
                flex-direction: column;
                gap: var(--space-4);
            }
            
            .slide-header-right {
                align-items: flex-start;
            }
            
            .slide-footer {
                flex-direction: column;
                gap: var(--space-4);
                padding: var(--space-4);
            }
            
            .progress-area {
                order: -1;
                max-width: 100%;
            }
            
            .nav-button {
                width: 100%;
            }
            
            .content-list li {
                padding: var(--space-3) var(--space-4);
            }
        }
        
        /* ============================================
           动画效果
           ============================================ */
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .slide-card {
            animation: slideIn 0.4s ease-out;
        }
        
        @media (prefers-reduced-motion: reduce) {
            .slide-card {
                animation: none;
            }
            
            .nav-button:hover:not(:disabled) {
                transform: none;
            }
            
            .content-list li:hover {
                transform: none;
            }
        }
    </style>
</head>

    <div class="course-container">
        <!-- 顶部导航栏 -->
        <nav class="top-nav">

                    <div class="progress-area">

    <script>
        // ============================================
        // 课件数据
        // ============================================
        const slides = [
            {
                id: 1,
                title: "课程概述",
                subtitle: "第一课时：基础准备与环境搭建",
                icon: "fas fa-bullseye",
                badge: { icon: "fas fa-clock", text: "预计2-3小时" },
                content: `
                    <div class="content-section">
                        <div class="learning-objectives">
                            <h3 class="section-title"><i class="fas fa-star"></i> 学习目标</h3>
                            <ul class="content-list">
                                <li>完成所有开发工具的安装和配置</li>
                                <li>创建并初始化Godot项目</li>
                                <li>创建标准项目文件夹结构</li>
                                <li>掌握基础版本控制流程</li>
                                <li>运行第一个Godot程序</li>
                            </ul>
                        </div>
                    </div>
                    <div class="tip-box success">
                        <h5><i class="fas fa-lightbulb" style="color: var(--success-color);"></i> 学习建议</h5>
                        <p>建议按照顺序完成每个步骤，遇到问题可以在GitHub Issues提问。本课时是整个教程的基础，请务必完成所有练习。</p>
                    </div>
                `
            },
            {
                id: 2,
                title: "安装 Godot 引擎",
                subtitle: "方式一：从官网下载",
                icon: "fas fa-download",
                badge: { icon: "fas fa-globe", text: "官网下载" },
                content: `
                    <div class="content-section">
                        <h3 class="section-title"><i class="fas fa-list-ol"></i> 下载步骤</h3>

        // ============================================
        // 状态管理
        // ============================================
        let currentSlide = 0;
        const totalSlides = slides.length;
        
        // DOM 元素
        const slideNumber = document.getElementById('slideNumber');
        const titleText = document.getElementById('titleText');
        const slideTitle = document.getElementById('slideTitle');
        const slideSubtitle = document.getElementById('slideSubtitle');
        const slideContent = document.getElementById('slideContent');
        const slideBadge = document.getElementById('slideBadge');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const progressStart = document.getElementById('progressStart');
        const indicators = document.getElementById('indicators');
        const keyboardHint = document.getElementById('keyboardHint');
        const slideCard = document.getElementById('slideCard');

        // ============================================
        // 初始化
        // ============================================
        function init() {
            createIndicators();
            updateSlide();
            setupEventListeners();
            showKeyboardHint();
        }

        // 创建指示器
        function createIndicators() {
            indicators.innerHTML = '';
            for (let i = 0; i < totalSlides; i++) {
                const btn = document.createElement('button');
                btn.className = 'indicator' + (i === 0 ? ' active' : '');
                btn.setAttribute('aria-label', `跳转到第 ${i + 1} 页`);
                btn.addEventListener('click', () => goToSlide(i));
                indicators.appendChild(btn);
            }
        }

        // 更新幻灯片
        function updateSlide() {
            const slide = slides[currentSlide];
            
            // 更新标题
            slideNumber.textContent = slide.id;
            titleText.textContent = slide.title;
            slideTitle.querySelector('i').className = slide.icon;
            slideSubtitle.textContent = slide.subtitle;
            
            // 更新徽章
            slideBadge.innerHTML = `<i class="${slide.badge.icon}"></i><span>${slide.badge.text}</span>`;
            
            // 更新内容
            slideContent.innerHTML = slide.content;
            
            // 更新进度
            const progress = ((currentSlide + 1) / totalSlides) * 100;
            progressFill.style.width = `${progress}%`;
            progressStart.textContent = currentSlide + 1;
            
            // 更新按钮
            prevBtn.disabled = currentSlide === 0;
            if (currentSlide === totalSlides - 1) {
                nextBtn.innerHTML = '<span>完成</span><i class="fas fa-check"></i>';
            } else {
                nextBtn.innerHTML = '<span>下一页</span><i class="fas fa-chevron-right"></i>';
            }
            
            // 更新指示器
            document.querySelectorAll('.indicator').forEach((ind, i) => {
                ind.classList.toggle('active', i === currentSlide);
            });
            
            // 滚动到顶部
            slideContent.scrollTop = 0;
            
            // 触发动画
            slideCard.style.animation = 'none';
            slideCard.offsetHeight; // 强制重绘
            slideCard.style.animation = 'slideIn 0.4s ease-out';
        }

        // 跳转到指定幻灯片
        function goToSlide(index) {
            if (index >= 0 && index < totalSlides) {
                currentSlide = index;
                updateSlide();
            }
        }

        // 上一页
        function goToPrev() {
            if (currentSlide > 0) {
                goToSlide(currentSlide - 1);
            }
        }

        // 下一页
        function goToNext() {
            if (currentSlide < totalSlides - 1) {
                goToSlide(currentSlide + 1);
            } else {
                showCompletion();
            }
        }

        // 显示完成提示
        function showCompletion() {
            alert('🎉 恭喜完成第一课时！\n\n你已经掌握了Godot开发环境的基础配置。\n继续前往教程主页开始下一课时的学习！');
        }

        // 显示键盘提示
        function showKeyboardHint() {
            setTimeout(() => {
                keyboardHint.classList.add('visible');
                setTimeout(() => {
                    keyboardHint.classList.remove('visible');
                }, 4000);
            }, 1000);
        }

        // 设置事件监听
        function setupEventListeners() {
            // 按钮点击
            prevBtn.addEventListener('click', goToPrev);
            nextBtn.addEventListener('click', goToNext);
            
            // 键盘导航
            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowLeft':
                        goToPrev();
                        break;
                    case 'ArrowRight':
                    case ' ':
                        e.preventDefault();
                        goToNext();
                        break;
                    case 'Home':
                        e.preventDefault();
                        goToSlide(0);
                        break;
                    case 'End':
                        e.preventDefault();
                        goToSlide(totalSlides - 1);
                        break;
                }
            });
            
            // 触摸滑动
            let touchStartX = 0;
            let touchEndX = 0;
            
            document.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            document.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        goToNext();
                    } else {
                        goToPrev();
                    }
                }
            }, { passive: true });
        }

        // 启动
        init();
    </script>
