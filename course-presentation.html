<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Godot HD2D生存游戏教程 - 第一课时课件演示">
    <meta name="keywords" content="Godot, 课件, 教程, 演示, HD2D">

    <link rel="stylesheet" href="css/shared-theme.css">
    
    <style>
        /* ============================================
           课件特定样式
           ============================================ */
        
        .course-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-8);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 课程头部 */
        .course-header {
            text-align: center;
            margin-bottom: var(--space-8);
            padding-bottom: var(--space-6);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .course-title {
            font-size: clamp(2rem, 5vw, 2.5rem);
            color: white;
            margin-bottom: var(--space-3);
            font-weight: 800;
        }
        
        .course-subtitle {
            font-size: var(--text-lg);
            color: rgba(255, 255, 255, 0.8);
        }

        .course-meta {
            display: flex;
            justify-content: center;
            gap: var(--space-6);
            margin-top: var(--space-4);
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            color: rgba(255, 255, 255, 0.7);
            font-size: var(--text-sm);
        }
        
        /* 卡片容器 */
        .card-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 500px;
        }
        
        /* 幻灯片卡片 */
        .slide {
            background: var(--card-bg);
            border-radius: var(--border-radius-lg);
            padding: var(--space-10);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-color);
            max-width: 900px;
            width: 100%;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s ease, opacity 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        }
        
        .slide-header {
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-4);
            border-bottom: 2px solid var(--border-color);
        }
        
        .slide-title {
            font-size: var(--text-2xl);
            color: var(--primary-color);
            margin-bottom: var(--space-2);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .slide-title i {
            font-size: var(--text-xl);
        }
        
        .slide-subtitle {
            font-size: var(--text-base);
            color: var(--text-light);
        }
        
        .slide-content {
            flex: 1;
            overflow-y: auto;
            padding-right: var(--space-2);
            color: var(--text-color);
        }
        
        .slide-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .slide-content::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }
        
        .slide-content::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 3px;
        }
        
        /* 内容区块 */
        .content-section {
            margin-bottom: var(--space-6);
        }
        
        .content-title {
            font-size: var(--text-lg);
            color: var(--text-color);
            margin-bottom: var(--space-3);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .content-title i {
            color: var(--primary-color);
        }
        
        .content-list {
            list-style: none;
            padding-left: var(--space-6);
        }
        
        .content-list li {
            margin-bottom: var(--space-3);
            padding-left: var(--space-4);
            position: relative;
            line-height: var(--leading-relaxed);
            color: var(--text-light);
        }
        
        .content-list li::before {
            content: "▸";
            color: var(--primary-color);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        .content-list li.completed::before {
            content: "✓";
            color: var(--success-color);
        }
        
        /* 代码块 */
        .code-block {
            background: var(--code-bg);
            border-radius: var(--border-radius);
            padding: var(--space-4);
            margin: var(--space-4) 0;
            border-left: 4px solid var(--primary-color);
            font-family: 'Consolas', 'Monaco', monospace;
            overflow-x: auto;
        }
        
        .code-block code {
            color: var(--neutral-200);
            font-size: var(--text-sm);
            line-height: 1.6;
        }

        .code-comment {
            color: #6a9955;
        }

        .code-keyword {
            color: #569cd6;
        }

        .code-string {
            color: #ce9178;
        }

        .code-function {
            color: #dcdcaa;
        }
        
        /* 链接样式 */
        .link-item {
            color: var(--primary-color);
            text-decoration: none;
            transition: color var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
        }
        
        .link-item:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        
        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--space-8);
            padding-top: var(--space-6);
            border-top: 1px solid var(--border-color);
        }
        
        .nav-button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: var(--space-3) var(--space-6);
            border-radius: var(--border-radius);
            font-size: var(--text-base);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            min-width: 120px;
            justify-content: center;
        }
        
        .nav-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .nav-button:disabled {
            background: var(--bg-secondary);
            color: var(--text-light);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .nav-button.prev {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--border-color);
        }
        
        .nav-button.prev:hover:not(:disabled) {
            background: var(--bg-secondary);
            border-color: var(--primary-color);
        }
        
        /* 进度指示器 */
        .progress-container {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            flex: 1;
            justify-content: center;
            max-width: 300px;
        }
        
        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: var(--border-radius-full);
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: var(--border-radius-full);
            transition: width var(--transition-smooth);
        }
        
        .progress-text {
            font-size: var(--text-sm);
            color: var(--text-light);
            min-width: 50px;
            text-align: center;
        }
        
        /* 幻灯片编号 */
        .slide-number {
            position: absolute;
            top: var(--space-4);
            right: var(--space-4);
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            width: 40px;
            height: 40px;
            border-radius: var(--border-radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: var(--text-sm);
            box-shadow: var(--shadow-md);
        }

        /* 幻灯片指示器 */
        .slide-indicators {
            display: flex;
            justify-content: center;
            gap: var(--space-2);
            margin-top: var(--space-4);
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: var(--border-radius-full);
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .indicator.active {
            background: var(--primary-color);
            transform: scale(1.2);
        }

        .indicator:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        /* 学习目标特殊样式 */
        .learning-objectives {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: var(--space-5);
            border-radius: var(--border-radius);
            margin-bottom: var(--space-6);
        }
        
        .learning-objectives .content-title {
            color: white;
        }
        
        .learning-objectives .content-list li {
            color: rgba(255, 255, 255, 0.95);
        }

        .learning-objectives .content-list li::before {
            color: white;
        }

        /* 提示框 */
        .tip-box {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: var(--border-radius);
            padding: var(--space-4);
            margin-top: var(--space-4);
        }

        .tip-box h5 {
            color: var(--primary-color);
            margin-bottom: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .tip-box p {
            color: var(--text-light);
            margin: 0;
        }

        /* 步骤标记 */
        .step-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: var(--primary-color);
            color: white;
            border-radius: var(--border-radius-full);
            font-size: var(--text-sm);
            font-weight: 600;
            margin-right: var(--space-2);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .course-container {
                padding: var(--space-4);
            }
            
            .course-title {
                font-size: 1.75rem;
            }
            
            .slide {
                padding: var(--space-6);
                min-height: 400px;
            }
            
            .slide-title {
                font-size: var(--text-xl);
            }
            
            .nav-buttons {
                flex-direction: column;
                gap: var(--space-4);
            }
            
            .progress-container {
                order: -1;
                width: 100%;
                max-width: none;
            }
            
            .nav-button {
                width: 100%;
            }

            .course-meta {
                flex-direction: column;
                gap: var(--space-2);
            }
        }
        
        /* 动画效果 */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(-30px);
            }
        }
        
        .slide {
            animation: slideIn 0.4s ease;
        }

        .slide.exit {
            animation: slideOut 0.3s ease;
        }

        /* 键盘导航提示 */
        .keyboard-hint {
            position: fixed;
            bottom: var(--space-4);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: var(--space-2) var(--space-4);
            border-radius: var(--border-radius-full);
            font-size: var(--text-sm);
            opacity: 0;
            transition: opacity var(--transition-base);
            pointer-events: none;
        }

        .keyboard-hint.visible {
            opacity: 1;
        }
        
        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            .slide {
                animation: none;
            }
            
            .nav-button:hover:not(:disabled) {
                transform: none;
            }
        }
    </style>
</head>

        // 当前幻灯片索引
        let currentSlideIndex = 0;
        const totalSlides = slides.length;

        // DOM元素
        const slideNumberEl = document.getElementById('slide-number');
        const slideTitleEl = document.getElementById('slide-title');
        const slideSubtitleEl = document.getElementById('slide-subtitle');
        const slideContentEl = document.getElementById('slide-content');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const slideIndicators = document.getElementById('slide-indicators');
        const keyboardHint = document.getElementById('keyboard-hint');

        // 创建幻灯片指示器
        function createIndicators() {
            slideIndicators.innerHTML = '';
            for (let i = 0; i < totalSlides; i++) {
                const indicator = document.createElement('div');
                indicator.className = 'indicator' + (i === 0 ? ' active' : '');
                indicator.addEventListener('click', () => goToSlide(i));
                indicator.setAttribute('aria-label', `跳转到第 ${i + 1} 张幻灯片`);
                slideIndicators.appendChild(indicator);
            }
        }

        // 更新幻灯片内容
        function updateSlide() {
            const slide = slides[currentSlideIndex];
            
            // 更新内容
            slideNumberEl.textContent = slide.id;
            slideTitleEl.innerHTML = `<i class="${slide.icon}"></i> ${slide.title}`;
            slideSubtitleEl.textContent = slide.subtitle;
            slideContentEl.innerHTML = slide.content;
            
            // 更新进度
            const progressPercentage = ((currentSlideIndex + 1) / totalSlides) * 100;
            progressFill.style.width = `${progressPercentage}%`;
            progressText.textContent = `${currentSlideIndex + 1}/${totalSlides}`;
            
            // 更新按钮状态
            prevBtn.disabled = currentSlideIndex === 0;
            nextBtn.innerHTML = currentSlideIndex === totalSlides - 1 
                ? '完成 <i class="fas fa-check"></i>' 
                : '下一张 <i class="fas fa-chevron-right"></i>';
            
            // 更新指示器
            const indicators = slideIndicators.querySelectorAll('.indicator');
            indicators.forEach((ind, index) => {
                ind.classList.toggle('active', index === currentSlideIndex);
            });

            // 滚动到内容顶部
            slideContentEl.scrollTop = 0;
        }

        // 切换到指定幻灯片
        function goToSlide(index) {
            if (index >= 0 && index < totalSlides) {
                currentSlideIndex = index;
                updateSlide();
            }
        }

        // 上一张
        function goToPrev() {
            if (currentSlideIndex > 0) {
                goToSlide(currentSlideIndex - 1);
            }
        }

        // 下一张
        function goToNext() {
            if (currentSlideIndex < totalSlides - 1) {
                goToSlide(currentSlideIndex + 1);
            } else {
                // 最后一张，显示完成提示
                showCompletionMessage();
            }
        }

        // 显示完成消息
        function showCompletionMessage() {
            alert('🎉 恭喜！你已经完成了第一课时的所有内容！\n\n继续前往下一课时学习更多内容。');
        }

        // 显示键盘提示
        function showKeyboardHint() {
            keyboardHint.classList.add('visible');
            setTimeout(() => {
                keyboardHint.classList.remove('visible');
            }, 3000);
        }

        // 键盘导航
        document.addEventListener('keydown', (event) => {
            switch(event.key) {
                case 'ArrowLeft':
                    goToPrev();
                    break;
                case 'ArrowRight':
                case ' ':
                    event.preventDefault();
                    goToNext();
                    break;
                case 'Home':
                    event.preventDefault();
                    goToSlide(0);
                    break;
                case 'End':
                    event.preventDefault();
                    goToSlide(totalSlides - 1);
                    break;
            }
        });

        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].screenX;
        }, { passive: true });
        
        document.addEventListener('touchend', (event) => {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });
        
        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    goToNext();
                } else {
                    goToPrev();
                }
            }
        }

        // 按钮事件
        prevBtn.addEventListener('click', goToPrev);
        nextBtn.addEventListener('click', goToNext);

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            createIndicators();
            updateSlide();

            // 首次显示键盘提示
            setTimeout(showKeyboardHint, 1000);
        });

        // 页面可见性变化时的处理
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                // 页面重新可见时，可以恢复某些状态
            }
        });
    </script>
