        // ============================================
        // 状态管理
        // ============================================
        let currentSlide = 0;
        const totalSlides = slides.length;
        
        // DOM 元素
        const slideNumber = document.getElementById('slideNumber');
        const titleText = document.getElementById('titleText');
        const slideTitle = document.getElementById('slideTitle');
        const slideSubtitle = document.getElementById('slideSubtitle');
        const slideContent = document.getElementById('slideContent');
        const slideBadge = document.getElementById('slideBadge');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const progressStart = document.getElementById('progressStart');
        const indicators = document.getElementById('indicators');
        const keyboardHint = document.getElementById('keyboardHint');
        const slideCard = document.getElementById('slideCard');

        // ============================================
        // 初始化
        // ============================================
        function init() {
            createIndicators();
            updateSlide();
            setupEventListeners();
            showKeyboardHint();
        }

        // 创建指示器
        function createIndicators() {
            indicators.innerHTML = '';
            for (let i = 0; i < totalSlides; i++) {
                const btn = document.createElement('button');
                btn.className = 'indicator' + (i === 0 ? ' active' : '');
                btn.setAttribute('aria-label', `跳转到第 ${i + 1} 页`);
                btn.addEventListener('click', () => goToSlide(i));
                indicators.appendChild(btn);
            }
        }

        // 更新幻灯片
        function updateSlide() {
            const slide = slides[currentSlide];
            
            // 更新标题
            slideNumber.textContent = slide.id;
            titleText.textContent = slide.title;
            slideTitle.querySelector('i').className = slide.icon;
            slideSubtitle.textContent = slide.subtitle;
            
            // 更新徽章
            slideBadge.innerHTML = `<i class="${slide.badge.icon}"></i><span>${slide.badge.text}</span>`;
            
            // 更新内容
            slideContent.innerHTML = slide.content;
            
            // 更新进度
            const progress = ((currentSlide + 1) / totalSlides) * 100;
            progressFill.style.width = `${progress}%`;
            progressStart.textContent = currentSlide + 1;
            
            // 更新按钮
            prevBtn.disabled = currentSlide === 0;
            if (currentSlide === totalSlides - 1) {
                nextBtn.innerHTML = '<span>完成</span><i class="fas fa-check"></i>';
            } else {
                nextBtn.innerHTML = '<span>下一页</span><i class="fas fa-chevron-right"></i>';
            }
            
            // 更新指示器
            document.querySelectorAll('.indicator').forEach((ind, i) => {
                ind.classList.toggle('active', i === currentSlide);
            });
            
            // 滚动到顶部
            slideContent.scrollTop = 0;
            
            // 触发动画
            slideCard.style.animation = 'none';
            slideCard.offsetHeight; // 强制重绘
            slideCard.style.animation = 'slideIn 0.4s ease-out';
        }

        // 跳转到指定幻灯片
        function goToSlide(index) {
            if (index >= 0 && index < totalSlides) {
                currentSlide = index;
                updateSlide();
            }
        }

        // 上一页
        function goToPrev() {
            if (currentSlide > 0) {
                goToSlide(currentSlide - 1);
            }
        }

        // 下一页
        function goToNext() {
            if (currentSlide < totalSlides - 1) {
                goToSlide(currentSlide + 1);
            } else {
                showCompletion();
            }
        }

        // 显示完成提示
        function showCompletion() {
            alert('🎉 恭喜完成第一课时！\n\n你已经掌握了Godot开发环境的基础配置。\n继续前往教程主页开始下一课时的学习！');
        }

        // 显示键盘提示
        function showKeyboardHint() {
            setTimeout(() => {
                keyboardHint.classList.add('visible');
                setTimeout(() => {
                    keyboardHint.classList.remove('visible');
                }, 4000);
            }, 1000);
        }

        // 设置事件监听
        function setupEventListeners() {
            // 按钮点击
            prevBtn.addEventListener('click', goToPrev);
            nextBtn.addEventListener('click', goToNext);
            
            // 键盘导航
            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowLeft':
                        goToPrev();
                        break;
                    case 'ArrowRight':
                    case ' ':
                        e.preventDefault();
                        goToNext();
                        break;
                    case 'Home':
                        e.preventDefault();
                        goToSlide(0);
                        break;
                    case 'End':
                        e.preventDefault();
                        goToSlide(totalSlides - 1);
                        break;
                }
            });
            
            // 触摸滑动
            let touchStartX = 0;
            let touchEndX = 0;
            
            document.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            document.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        goToNext();
                    } else {
                        goToPrev();
                    }
                }
            }, { passive: true });
        }

        // 启动
        init();
    </script>
</body>
</html>
